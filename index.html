<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador APD</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <h1>APD <span>Actos Públicos Digitales</span></h1>
        <div class="d-flex gap-3 align-items-center">
          <a href="http://servicios.abc.gob.ar/servaddo/puntaje.ingreso.docencia/" target="_blank" class="btn btn-sm btn-info text-nowrap align-self-start">Consultar oblea</a>
          <select class="form-select form-select-sm" id="theme">
            <option value="auto">Auto</option>
            <option value="light">Claro</option>
            <option value="dark">Oscuro</option>
          </select>
          <a class="text-info" href="https://github.com/cdmoro/buscador-apd" target="_blank">
            <svg class="icon" aria-hidden="true">
              <use href="/icons.svg#github-icon"></use>
            </svg>
          </a>
          <a class="text-info" href="https://x.com/CarlosBonadeo" target="_blank">
            <svg class="icon" aria-hidden="true">
              <use href="/icons.svg#x-icon"></use>
            </svg>
          </a>
        </div>
      </div>
    </nav>

    <main class="mt-4 container mb-5">
      <div class="card" id="filters-form">
        <div class="card-body">
          <h2 class="card-title">Filtros</h2>
          <form id="filters">
            <div id="filters-wrapper" class="mb-3 d-grid gap-3">
              <div>
                <label for="modalidad" class="d-flex justify-content-between">
                  Niveles o Modalidades
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="modalidadNot">
                    <label class="form-check-label" for="modalidadNot">Invertir</label>
                  </div>
                </label>
                <div class="input-group">
                  <select class="form-select" id="modalidad" multiple size="6"></select>
                  <div class="input-group-text">
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="modalidad"
                    placeholder="Limpiar filtro"
                  >
                    <svg class="icon" aria-hidden="true">
                      <use href="/icons.svg#clear-filter-icon"></use>
                    </svg>
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="modalidad-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="distrito" class="d-flex justify-content-between">
                  Distrito
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="distritoNot">
                    <label class="form-check-label" for="distritoNot">Invertir</label>
                  </div>
                </label>
                <div class="input-group">
                  <select class="form-select" id="distrito" multiple size="6"></select>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="distrito"
                    placeholder="Limpiar filtro"
                  >
                    <svg class="icon" aria-hidden="true">
                      <use href="/icons.svg#clear-filter-icon"></use>
                    </svg>
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="distrito-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="cargo" class="d-flex justify-content-between">
                  Cargo
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="cargoNot">
                    <label class="form-check-label" for="cargoNot">Invertir</label>
                  </div>
                </label>
                <div class="input-group">
                  <select class="form-select" id="cargo" multiple size="6"></select>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="cargo"
                    placeholder="Limpiar filtro"
                  >
                    <svg class="icon" aria-hidden="true">
                      <use href="/icons.svg#clear-filter-icon"></use>
                    </svg>
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="cargo-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="estado" class="d-flex justify-content-between">
                  Estado
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="estadoNot">
                    <label class="form-check-label" for="estadoNot">Invertir</label>
                  </div>
                </label>
                <div class="input-group">
                  <select class="form-select" id="estado" multiple size="6"></select>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="estado"
                    placeholder="Limpiar filtro"
                  >
                    <svg class="icon" aria-hidden="true">
                      <use href="/icons.svg#clear-filter-icon"></use>
                    </svg>
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="estado-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="ige">IGE</label>
                <input class="form-control" id="ige" type="text" pattern="[0-9]+" placeholder="Ej.: 3846779" />
              </div>
              <div>
                <label for="escuela">Escuela</label>
                <input class="form-control" id="escuela" type="text" pattern="[0-9A-Za-z]+" placeholder="Ej.: 0055JI0946" />
              </div>
            </div>
            <div class="mb-3">
              <label for="cierre-date">Cierre de Oferta</label>
              <div class="d-flex gap-3 justify-content-between flex-column flex-md-row">
                <div class="flex-shrink-1 cierre-mode-select">
                  <select class="form-select" id="cierre-mode">
                    <option value="0" selected>Exacta</option>
                    <option value="1">Desde</option>
                    <option value="2">Hasta</option>
                  </select>
                </div>
                <div class="input-group w-100">
                  <input class="form-control" id="cierre-date" type="date" />
                  <input class="form-control" id="cierre-time" type="time" />
                  <button
                      id="clear-date-input"
                      type="button"
                      class="btn btn-outline-secondary"
                      placeholder="Limpiar filtro"
                    >
                      <svg class="icon" aria-hidden="true">
                        <use href="/icons.svg#clear-filter-icon"></use>
                      </svg>
                    </button>
                </div>
              </div>
              <div class="form-text" id="basic-addon4">Si no se especifica la hora se tomará el día completo.</div>
            </div>
            <div class="d-flex gap-3">
              <button class="btn btn-info" type="submit" id="search">
                <svg class="icon" aria-hidden="true">
                  <use href="/icons.svg#search-icon"></use>
                </svg>
                Buscar
              </button>
              <button class="btn btn-secondary" type="button" id="reset-form">
                Limpiar filtros
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="card" id="results">
        <div class="card-body">
          <h2 class="card-title d-flex justify-content-between mb-4 flex-column flex-md-row">
            Resultados
            <div>
              <button type="button" class="btn btn-sm btn-secondary" id="new-search">
                <svg class="icon" aria-hidden="true">
                  <use href="/icons.svg#search-icon"></use>
                </svg>
                Nueva búsqueda
              </button>
              <button type="button" class="btn btn-sm btn-info" id="share-search">
                <svg class="icon" aria-hidden="true">
                  <use href="/icons.svg#copy-icon"></use>
                </svg>
                Copiar búsqueda
              </button>
            </div>
          </h2>
          <div id="active-filters" class="mb-3 border rounded p-1 table-responsive">
              <table class="table table-borderless mb-0 w-auto" id="filter-card-group"></table>
          </div>
          <div class="results-detail d-flex justify-content-between align-items-center flex-md-row flex-column mb-3">
            <nav>
              <ul id="pagination" class="pagination mb-0"></ul>
            </nav>
            <span id="count" class="text-muted"></span>
          </div>
          <div class="card-results"></div>
          <nav class="mt-3">
            <ul id="pagination-bottom" class="pagination justify-content-center mb-0"></ul>
          </nav>
          <!-- <table class="table table-striped table-hover">
            <thead>
              <tr>
                <th>Estado</th>
                <th>Cargo</th>
                <th>Distrito</th>
                <th>Escuela</th>
                <th>Modalidad</th>
                <th>Cierre</th>
              </tr>
            </thead>
            <tbody id="table-results"></tbody>
          </table> -->
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
