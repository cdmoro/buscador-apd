<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador APD</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <h1>APD <span>Actos Públicos Digitales</span></h1>
        <div class="d-flex gap-2 align-items-center">
          <select class="form-select form-select-sm" id="theme">
            <option value="auto">Auto</option>
            <option value="light">Claro</option>
            <option value="dark">Oscuro</option>
          </select>
          <a href="https://github.com/cdmoro/buscador-apd" target="_blank">
            <svg class="icon" aria-hidden="true">
              <use href="/icons.svg#github-icon"></use>
            </svg>
          </a>
          <a href="https://x.com/CarlosBonadeo" target="_blank">
            <svg class="icon" aria-hidden="true">
              <use href="/icons.svg#x-icon"></use>
            </svg>
          </a>
        </div>
      </div>
    </nav>

    <main class="mt-4 container">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title">Filtros</h2>
          <form id="filters">
            <div id="filters-wrapper" class="mb-3">
              <div>
                <label for="modalidad">Modalidad</label>
                <div class="input-group">
                  <select class="form-select" id="modalidad" multiple size="6"></select>
                  <div class="input-group-text">
                    <label
                      ><input type="checkbox" id="modalidadNot" />
                      Invertir</label
                    >
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="modalidad"
                  >
                    &times;
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="modalidad-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="distrito">Distrito</label>
                <div class="input-group">
                  <select class="form-select" id="distrito" multiple size="6"></select>
                  <div class="input-group-text">
                    <label
                      ><input type="checkbox" id="distritoNot" />
                      Invertir</label
                    >
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="distrito"
                  >
                    &times;
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="distrito-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="cargo">Cargo</label>
                <div class="input-group">
                  <select class="form-select" id="cargo" multiple size="6"></select>
                  <div class="input-group-text">
                    <label
                      ><input type="checkbox" id="cargoNot" /> Invertir</label
                    >
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="cargo"
                  >
                    &times;
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="cargo-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="estado">Estado</label>
                <div class="input-group">
                  <select class="form-select" id="estado" multiple size="6"></select>
                  <div class="input-group-text">
                    <label
                      ><input type="checkbox" id="estadoNot" /> Invertir</label
                    >
                  </div>
                  <button
                    type="button"
                    class="btn btn-outline-secondary clear-filter"
                    value="estado"
                  >
                    &times;
                  </button>
                </div>
                <div class="hint">
                  <span class="active-filters" id="estado-filters"
                    ><span class="filter-chip">Todos</span></span
                  >
                </div>
              </div>
              <div>
                <label for="ige">IGE</label>
                <input class="form-control" id="ige" type="text" placeholder="Ej.: 3846779" />
              </div>
              <div>
                <label for="escuela">Escuela</label>
                <input class="form-control" id="escuela" type="text" placeholder="Ej.: 0055JI0946" />
              </div>
            </div>
            <button class="btn btn-primary" type="button" id="search">
              Buscar
            </button>
            <button class="btn btn-secondary" type="button" id="reset-form">
              Limpiar filtros
            </button>
          </form>
        </div>
      </div>

      <div id="results" class="card">
        <div class="card-body">
          <h2 class="card-title">Resultados</h2>
          <div class="d-flex justify-content-between align-items-center flex-md-row flex-sm-column">
            <nav>
              <ul id="pagination" class="pagination"></ul>
            </nav>
            <span id="count" class="text-muted"></span>
          </div>
          <div class="card-results row row-cols-1 row-cols-md-3 g-4"></div>
          <!-- <table class="table table-striped table-hover">
            <thead>
              <tr>
                <th>Estado</th>
                <th>Cargo</th>
                <th>Distrito</th>
                <th>Escuela</th>
                <th>Modalidad</th>
                <th>Cierre</th>
              </tr>
            </thead>
            <tbody id="table-results"></tbody>
          </table> -->
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
